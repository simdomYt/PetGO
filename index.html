<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>PetGO 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght=400;600;700;800;900&family=Inter:wght=400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#FF5A3C;--yellow:#FFD93D;--mint:#E8F8F0;--dark:#1A1A2E;
  --gray:#6B7280;--light:#F9FAFB;--white:#FFFFFF;--red:#EF4444;
  --green:#22C55E;--blue:#3B82F6;--orange:#F97316;
  --shadow:0 4px 20px rgba(0,0,0,0.08);--radius:16px;
}
body{font-family:'Inter',sans-serif;background:var(--light);color:var(--dark);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Nunito',sans-serif}
button{cursor:pointer;font-family:'Inter',sans-serif;border:none;outline:none}
input,textarea,select{font-family:'Inter',sans-serif;outline:none;font-size:16px} /* 16px запобігає зуму в iOS */

/* NAV */
nav{background:var(--white);box-shadow:var(--shadow);position:sticky;top:0;z-index:100;padding:0 24px}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:15px}
.logo{font-family:'Nunito',sans-serif;font-size:26px;font-weight:900;color:var(--coral);letter-spacing:-1px;display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
.logo span{color:var(--dark)}
.nav-tabs{display:flex;gap:4px;overflow-x:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:8px 14px;border-radius:10px;font-size:14px;font-weight:600;background:none;color:var(--gray);transition:all .2s;white-space:nowrap;display:flex;align-items:center}
.nav-tab:hover{background:var(--mint);color:var(--dark)}
.nav-tab.active{background:var(--coral);color:var(--white)}
.nav-user{display:flex;align-items:center;gap:10px;flex-shrink:0}
.nav-username{font-weight:700;font-size:14px;color:var(--dark);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{padding:7px 14px;border-radius:10px;background:var(--light);color:var(--gray);font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap}
.btn-logout:hover{background:var(--red);color:var(--white)}

/* PAGES */
.page{display:none;max-width:1100px;margin:0 auto;padding:24px 16px}
.page.active{display:block}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fff5f3 0%,#e8f8f0 100%);padding:16px}
.auth-card{background:var(--white);border-radius:24px;box-shadow:0 8px 40px rgba(255,90,60,.12);padding:32px 24px;width:100%;max-width:420px}
.auth-logo{font-family:'Nunito',sans-serif;font-size:36px;font-weight:900;color:var(--coral);text-align:center;margin-bottom:8px}
.auth-tagline{text-align:center;color:var(--gray);font-size:14px;margin-bottom:24px}
.auth-tabs{display:flex;background:var(--light);border-radius:12px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:10px;border-radius:9px;font-size:14px;font-weight:700;background:none;color:var(--gray);transition:all .2s;font-family:'Nunito',sans-serif}
.auth-tab.active{background:var(--white);color:var(--coral);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--dark);margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;border:2px solid #E5E7EB;border-radius:12px;font-size:15px;transition:border-color .2s;background:var(--white)}
.form-input:focus{border-color:var(--coral)}
.btn-primary{width:100%;padding:14px;border-radius:12px;background:var(--coral);color:var(--white);font-size:16px;font-weight:800;font-family:'Nunito',sans-serif;transition:all .2s;box-shadow:0 4px 14px rgba(255,90,60,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,90,60,.4)}
.btn-primary:active{transform:translateY(0)}
.auth-error{color:var(--red);font-size:13px;text-align:center;margin-bottom:12px;font-weight:600}

/* LISTINGS PAGE */
.section-title{font-size:24px;font-weight:900;color:var(--dark);margin-bottom:4px}
.section-sub{color:var(--gray);font-size:14px;margin-bottom:16px}

/* FILTERS */
.filters-wrap{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:24px}
.filters-row{display:flex;flex-wrap:nowrap;gap:8px;align-items:center;overflow-x:auto;padding-bottom:4px}
.filters-row::-webkit-scrollbar{height:4px}
.filters-row::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:10px}
.filter-btn{padding:8px 16px;border-radius:30px;font-size:13px;font-weight:700;background:var(--light);color:var(--gray);border:2px solid transparent;transition:all .2s;font-family:'Nunito',sans-serif;white-space:nowrap}
.filter-btn:hover{border-color:var(--coral);color:var(--coral)}
.filter-btn.active{background:var(--coral);color:var(--white);border-color:var(--coral)}
.search-bar{display:flex;gap:10px;margin-bottom:12px}
.search-input{width:100%;padding:12px 18px;border:2px solid #E5E7EB;border-radius:30px;font-size:14px;transition:border-color .2s}
.search-input:focus{border-color:var(--coral)}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.listing-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s;position:relative}
.listing-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.12)}
.card-img-wrap{height:160px;overflow:hidden;background:#f0f0f0;position:relative}
.card-img-wrap img{width:100%;height:100%;object-fit:cover}
.card-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(135deg,#ffe5e0,#e8f8f0)}
.card-body{padding:14px}
.card-pet-type{display:inline-block;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:800;font-family:'Nunito',sans-serif;margin-bottom:6px;text-transform:uppercase}
.card-pet-type.dog{background:#FFF3E0;color:#F97316}
.card-pet-type.cat{background:#F3E5F5;color:#9C27B0}
.card-title{font-size:16px;font-weight:800;color:var(--dark);margin-bottom:4px;font-family:'Nunito',sans-serif}
.card-breed{font-size:13px;color:var(--gray);margin-bottom:8px}
.card-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px}
.card-price{font-size:18px;font-weight:900;color:var(--coral);font-family:'Nunito',sans-serif}
.card-price span{font-size:12px;font-weight:600;color:var(--gray)}
.stars{display:flex;gap:2px;align-items:center}
.stars .star{font-size:13px;color:#FFD93D}
.stars .star.empty{color:#E5E7EB}
.star-count{font-size:11px;color:var(--gray);margin-left:4px}
.strike-badge{position:absolute;top:10px;right:10px;background:var(--red);color:#fff;border-radius:8px;padding:3px 8px;font-size:11px;font-weight:800}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;padding:16px;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:24px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);position:relative}
.modal-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:20px;font-weight:900;font-family:'Nunito',sans-serif}
.modal-close{width:36px;height:36px;border-radius:50%;background:var(--light);color:var(--gray);font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.modal-close:hover{background:var(--red);color:#fff}
.modal-body{padding:16px 20px 20px}

/* GALLERY */
.gallery{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.gallery img{width:90px;height:70px;object-fit:cover;border-radius:10px;flex-shrink:0;cursor:pointer}
.gallery-main img{width:100%;height:220px;object-fit:cover;border-radius:14px;margin-bottom:10px}
.listing-detail-price{font-size:26px;font-weight:900;color:var(--coral);font-family:'Nunito',sans-serif;margin-bottom:12px}
.listing-detail-desc{color:var(--gray);font-size:14px;line-height:1.5;margin-bottom:16px}
.detail-meta{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.detail-meta-item{background:var(--light);padding:6px 12px;border-radius:10px;font-size:13px;font-weight:600}

/* REVIEWS */
.reviews-section{margin-top:20px;border-top:2px solid var(--light);padding-top:16px}
.review-form{background:var(--light);border-radius:14px;padding:14px;margin-bottom:14px}
.stars-pick{display:flex;gap:6px;margin-bottom:10px;font-size:24px;cursor:pointer}
.stars-pick span{color:#E5E7EB}
.stars-pick span.lit{color:var(--yellow)}
.review-item{background:var(--white);border:1px solid #E5E7EB;border-radius:12px;padding:12px;margin-bottom:10px}

/* CHAT */
.chat-list{display:flex;flex-direction:column;gap:10px}
.chat-item{background:var(--white);border-radius:14px;box-shadow:var(--shadow);padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px}
.chat-window{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);height:75vh;min-height:400px;display:flex;flex-direction:column}
.chat-header{padding:14px;border-bottom:2px solid var(--light);display:flex;align-items:center;gap:10px}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:14px}
.msg.mine{align-self:flex-end;background:var(--coral);color:#fff;border-bottom-right-radius:4px}
.msg.theirs{align-self:flex-start;background:var(--light);color:var(--dark);border-bottom-left-radius:4px}
.chat-input-row{padding:10px;border-top:2px solid var(--light);display:flex;gap:8px}

/* MY LISTINGS */
.my-listing-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;gap:12px;margin-bottom:12px;align-items:flex-start}
.my-listing-img{width:70px;height:70px;border-radius:12px;object-fit:cover;flex-shrink:0;font-size:26px;display:flex;align-items:center;justify-content:center;background:var(--light)}
.my-listing-info{flex:1;min-width:0}
.my-listing-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700}

/* FORM/CREATE LISTING */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-select{width:100%;padding:12px 14px;border:2px solid #E5E7EB;border-radius:12px;font-size:15px;background:var(--white)}

/* ADS */
.ad-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.ad-img, .ad-video{width:100%;height:180px;object-fit:cover}
.order-ad-banner{background:linear-gradient(135deg,var(--coral),#ff8c7a);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:20px;color:#fff}

/* NOTIFICATION */
.notif{position:fixed;bottom:16px;right:16px;left:16px;z-index:999;background:var(--dark);color:#fff;padding:12px 16px;border-radius:12px;font-size:14px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.2);transform:translateY(100px);opacity:0;transition:all .3s}
.notif.show{transform:translateY(0);opacity:1}
.notif.success{background:var(--green)}
.notif.error{background:var(--red)}

/* RESPONSIVE ADAPTATION */
@media(max-width:768px){
  nav{padding:0 12px}
  .nav-inner{height:auto;flex-direction:column;padding:10px 0;gap:8px}
  .logo{font-size:22px}
  .nav-tabs{width:100%;justify-content:flex-start;padding:2px 0}
  .nav-user{width:100%;justify-content:space-between;border-top:1px solid #F3F4F6;padding-top:6px}
  
  .form-row{grid-template-columns:1fr}
  .modal{max-height:95vh;border-radius:16px}
  .gallery-main img{height:160px}
  .my-listing-card{flex-direction:column;align-items:stretch}
  .my-listing-img{width:100%;height:120px}
}
</style>
</head>
<body>

<div id="notif" class="notif"></div>

<!-- AUTH PAGE -->
<div id="authPage" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🐾 PetGO</div>
    <div class="auth-tagline">Знайди найкращого доглядача для свого улюбленця</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Увійти</button>
      <button class="auth-tab" onclick="switchAuth('register')">Реєстрація</button>
    </div>
    <div id="authError" class="auth-error" style="display:none"></div>
    <div id="loginForm">
      <div class="form-group"><label>Нікнейм</label><input class="form-input" id="loginNick" placeholder="your_nickname" autocomplete="username"/></div>
      <div class="form-group"><label>Пароль</label><input class="form-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password"/></div>
      <button class="btn-primary" onclick="doLogin()">Увійти</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="form-group"><label>Нікнейм</label><input class="form-input" id="regNick" placeholder="your_nickname" autocomplete="username"/></div>
      <div class="form-group"><label>Пароль</label><input class="form-input" type="password" id="regPass" placeholder="Мінімум 6 символів" autocomplete="new-password"/></div>
      <div class="form-group"><label>Підтвердити пароль</label><input class="form-input" type="password" id="regPass2" placeholder="Повторіть пароль" autocomplete="new-password"/></div>
      <button class="btn-primary" onclick="doRegister()">Зареєструватись</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <nav>
    <div class="nav-inner">
      <div class="logo" onclick="goTab('listings')">🐾 <span>Pet</span>GO</div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-tab="listings" onclick="goTab('listings')">🏠 Оголошення</button>
        <button class="nav-tab" data-tab="chats" onclick="goTab('chats')">💬 Чати</button>
        <button class="nav-tab" data-tab="mylistings" onclick="goTab('mylistings')">📋 Мої оголошення</button>
        <button class="nav-tab" data-tab="ads" onclick="goTab('ads')">📢 Реклама</button>
        <button class="nav-tab admin-tab" data-tab="admin" onclick="goTab('admin')" style="display:none">🛡️ Адмін</button>
      </div>
      <div class="nav-user">
        <span class="nav-username" id="navUsername"></span>
        <button class="btn-logout" onclick="doLogout()">Вийти</button>
      </div>
    </div>
  </nav>

  <!-- LISTINGS TAB -->
  <div id="tabListings" class="page active">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px">
      <div>
        <h2 class="section-title">Оголошення 🐾</h2>
        <p class="section-sub">Знайди доглядача для свого улюбленця</p>
      </div>
      <button class="btn-primary" style="width:auto;padding:12px 20px" onclick="openCreateModal()">+ Створити оголошення</button>
    </div>
    <div class="filters-wrap">
      <div class="search-bar"><input class="search-input" id="searchInput" placeholder="🔍 Пошук за назвою або породою..." oninput="applyFilters()"/></div>
      <div class="filters-row" id="filterBtns">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Всі</button>
        <button class="filter-btn" data-filter="new" onclick="setFilter('new',this)">🆕 Нові</button>
        <button class="filter-btn" data-filter="good" onclick="setFilter('good',this)">⭐ Добрі оцінки</button>
        <button class="filter-btn" data-filter="bad" onclick="setFilter('bad',this)">👎 Погані оцінки</button>
        <button class="filter-btn" data-filter="dog" onclick="setFilter('dog',this)">🐶 Собака</button>
        <button class="filter-btn" data-filter="cat" onclick="setFilter('cat',this)">🐱 Кіт</button>
        <button class="filter-btn" data-filter="price_high" onclick="setFilter('price_high',this)">💰 Висока ціна</button>
        <button class="filter-btn" data-filter="price_low" onclick="setFilter('price_low',this)">🪙 Низька ціна</button>
      </div>
    </div>
    <div class="cards-grid" id="listingsGrid"></div>
    <div id="listingsEmpty" class="empty-state" style="display:none; text-align:center; padding:30px;"><div class="icon" style="font-size:40px">🐾</div><h3>Оголошень не знайдено</h3></div>
  </div>

  <!-- CHATS TAB -->
  <div id="tabChats" class="page">
    <h2 class="section-title">Повідомлення 💬</h2>
    <div id="chatListView">
      <div class="chat-list" id="chatList"></div>
    </div>
    <div id="chatWindowView" style="display:none">
      <div class="chat-window">
        <div class="chat-header">
          <button class="chat-back" onclick="closeChatWindow()">←</button>
          <div><div class="chat-header-title" id="chatHeaderTitle"></div><div style="font-size:12px;color:var(--gray)" id="chatHeaderSub"></div></div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input class="chat-input" id="chatInput" style="flex:1; padding:10px 14px; border:2px solid #E5E7EB; border-radius:20px;" placeholder="Написати повідомлення..." onkeydown="if(event.key==='Enter')sendMsg()"/>
          <button class="btn-send" style="padding:10px 16px; background:var(--coral); color:#fff; border-radius:20px;" onclick="sendMsg()">Надіслати</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MY LISTINGS -->
  <div id="tabMylistings" class="page">
    <h2 class="section-title">Мої оголошення 📋</h2>
    <div id="myListingsContainer"></div>
  </div>

  <!-- ADS TAB -->
  <div id="tabAds" class="page">
    <div class="order-ad-banner">
      <h3>Хочеш розмістити рекламу?</h3>
      <a href="https://t.me/youtuber_simdom" target="_blank" class="btn-tg" style="display:inline-block; padding:10px 20px; background:#fff; color:var(--coral); border-radius:10px; font-weight:bold; text-decoration:none; margin-top:10px;">📨 Замовити рекламу</a>
    </div>
    <div id="adminAddAd" style="display:none">
      <!-- Admin Ad form kept dynamic -->
    </div>
    <div class="cards-grid" id="adsGrid"></div>
  </div>

  <!-- ADMIN TAB -->
  <div id="tabAdmin" class="page">
    <h2 class="section-title">🛡️ Адмін панель</h2>
    <div class="admin-section" id="adminListingsList"></div>
    <div class="admin-section" id="adminUsersList"></div>
  </div>
</div>

<!-- MODALS (STRUCTURE SIMPLIFIED FOR MOBILE RESILIENCE) -->
<div class="modal-overlay" id="createModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Нове оголошення 🐾</div>
      <button class="modal-close" onclick="closeModal('createModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Назва послуги *</label><input class="form-input" id="newTitle"/></div>
      <div class="form-row">
        <div class="form-group">
          <label>Тип *</label>
          <select class="form-select" id="newPetType"><option value="dog">🐶 Собака</option><option value="cat">🐱 Кіт</option></select>
        </div>
        <div class="form-group"><label>Порода *</label><input class="form-input" id="newBreed"/></div>
      </div>
      <div class="form-group"><label>Ціна (грн/год) *</label><input class="form-input" type="number" id="newPrice"/></div>
      <div class="form-group"><label>Опис</label><textarea class="form-input" id="newDesc" rows="2"></textarea></div>
      <div class="form-group">
        <label>Фото *</label>
        <input type="file" id="photoInput" multiple accept="image/*" onchange="previewPhotos(event)"/>
        <div class="photo-preview-grid" id="photoPreviewGrid"></div>
      </div>
      <button class="btn-primary" onclick="createListing()">Опублікувати</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detailTitle"></div>
      <button class="modal-close" onclick="closeModal('detailModal')">×</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>

<!-- Firebase Script -->

import { getDatabase, ref, set, get, push, onValue, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  authDomain: "petgo-49f8f.firebaseapp.com",
  databaseURL: "https://petgo-49f8f-default-rtdb.firebaseio.com/",
  projectId: "petgo-49f8f",
  storageBucket: "petgo-49f8f.firebasestorage.app",
  messagingSenderId: "208872589653",
  appId: "1:208872589653:web:8eeb9a2ebccaf2f3fd07dc",
  measurementId: "G-10102KMSGE"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentUser = null;
let allListings = {};
let allUsers = {};
let allAds = {};
let allReviews = {};
let allChats = {};
let currentFilterVal = 'all';
let currentChatId = null;
let newPhotos = [];

// АВТОМАТИЧНИЙ ВХІД ПРИ ЗАВАНТАЖЕННІ
window.addEventListener('DOMContentLoaded', async () => {
  const savedNick = localStorage.getItem('petgo_nick');
  const savedPass = localStorage.getItem('petgo_pass');
  
  if(savedNick && savedPass) {
    try {
      const snap = await get(ref(db, 'users/' + savedNick));
      if(snap.exists()) {
        const user = snap.val();
        if(user.password === savedPass && !user.banned) {
          loginSuccess(savedNick, user);
          return;
        }
      }
      // Якщо дані застаріли або невірні — очищуємо
      localStorage.removeItem('petgo_nick');
      localStorage.removeItem('petgo_pass');
    } catch(e) {
      console.error("Помилка авто-входу:", e);
    }
  }
});

window.switchAuth = function(mode){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(mode==='login'?0:1)));
  document.getElementById('loginForm').style.display = mode==='login'?'':'none';
  document.getElementById('registerForm').style.display = mode==='register'?'':'none';
};

window.doLogin = async function(){
  const nick = document.getElementById('loginNick').value.trim();
  const pass = document.getElementById('loginPass').value;
  if(!nick||!pass){ alert('Заповни всі поля'); return; }
  
  const snap = await get(ref(db,'users/'+nick));
  if(!snap.exists()){ alert('Користувача не знайдено'); return; }
  const user = snap.val();
  if(user.password !== pass){ alert('Невірний пароль'); return; }
  if(user.banned){ alert('Акаунт заблоковано'); return; }
  
  // Запам'ятовуємо пристрій
  localStorage.setItem('petgo_nick', nick);
  localStorage.setItem('petgo_pass', pass);
  
  loginSuccess(nick, user);
};

window.doRegister = async function(){
  const nick = document.getElementById('regNick').value.trim();
  const pass = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  if(!nick||!pass||!pass2){ alert('Заповни всі поля'); return; }
  if(pass !== pass2){ alert('Паролі не співпадають'); return; }
  
  const snap = await get(ref(db,'users/'+nick));
  if(snap.exists()){ alert('Нікнейм зайнятий'); return; }
  
  const userData = { password: pass, createdAt: Date.now(), banned: false };
  await set(ref(db,'users/'+nick), userData);
  
  // Запам'ятовуємо пристрій
  localStorage.setItem('petgo_nick', nick);
  localStorage.setItem('petgo_pass', pass);
  
  loginSuccess(nick, userData);
};

function loginSuccess(nick, userData){
  currentUser = { nick, ...userData };
  document.getElementById('authPage').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('navUsername').textContent = '👤 '+nick;
  if(nick==='simdom') {
    document.querySelectorAll('.admin-tab').forEach(el=>el.style.display='flex');
  }
  loadAll();
  goTab('listings');
}

window.doLogout = function(){
  // Очищуємо пам'ять пристрою, щоб більше не заходило автоматично
  localStorage.removeItem('petgo_nick');
  localStorage.removeItem('petgo_pass');
  
  currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('authPage').style.display='flex';
};

// РЕШТА ФУНКЦІОНАЛУ (ЗБЕРЕЖЕНО ПОВНІСТЮ БЕЗ ЗМІН ЛОГІКИ)
function loadAll(){
  onValue(ref(db,'listings'), snap=>{ allListings = snap.val()||{}; renderListings(); renderMyListings(); });
  onValue(ref(db,'ads'), snap=>{ allAds = snap.val()||{}; renderAds(); });
  onValue(ref(db,'reviews'), snap=>{ allReviews = snap.val()||{}; renderListings(); });
  onValue(ref(db,'chats'), snap=>{ allChats = snap.val()||{}; renderChatList(); if(currentChatId) renderChatMessages(); });
}

window.goTab = function(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  const pageEl = document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1));
  if(pageEl) pageEl.classList.add('active');
};

window.setFilter = function(f, btn){
  currentFilterVal=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderListings();
};

window.applyFilters = function(){ renderListings(); };

function renderListings(){
  const grid = document.getElementById('listingsGrid');
  if(!grid) return;
  const list = Object.entries(allListings).filter(([id,l])=>!l.frozen && !l.deleted);
  
  if(!list.length){ grid.innerHTML='<p style="padding:20px; color:gray;">Оголошень немає</p>'; return; }
  
  grid.innerHTML = list.map(([id,l])=>{
    const img = l.photos?.[0] ? `<img src="${l.photos[0]}"/>` : `<div class="card-img-placeholder">🐾</div>`;
    return `<div class="listing-card" onclick="openDetail('${id}')">
      <div class="card-img-wrap">${img}</div>
      <div class="card-body">
        <div class="card-title">${l.title||''}</div>
        <div class="card-breed">${l.breed||''}</div>
        <div class="card-footer"><div class="card-price">${l.price||0}<span> грн/год</span></div></div>
      </div>
    </div>`;
  }).join('');
}

window.openDetail = function(id){
  const l = allListings[id]; if(!l) return;
  const body = document.getElementById('detailBody');
  body.innerHTML = `
    <div class="gallery-main">${l.photos?.[0]?`<img src="${l.photos[0]}"/>`:''}</div>
    <div class="listing-detail-price">${l.price} грн/год</div>
    <div class="listing-detail-desc">${l.desc||'Без опису'}</div>
    <p style="font-size:13px; color:gray; margin-bottom:10px;">Власник: @${l.owner}</p>
    ${currentUser.nick !== l.owner ? `<button class="btn-primary" onclick="startChat('${id}','${l.owner}')">💬 Написати власнику</button>`:''}
  `;
  document.getElementById('detailModal').classList.add('open');
};

window.startChat = function(listingId, ownerNick){
  const chatId = [currentUser.nick, ownerNick, listingId].sort().join('_');
  set(ref(db,'chats/'+chatId),{ participants:[currentUser.nick,ownerNick], listingTitle: allListings[listingId]?.title||'Чат', messages:{} });
  closeModal('detailModal');
  goTab('chats');
  openChatWindow(chatId);
};

window.openChatWindow = function(chatId){
  currentChatId = chatId;
  document.getElementById('chatListView').style.display='none';
  document.getElementById('chatWindowView').style.display='block';
  renderChatMessages();
};

window.closeChatWindow = function(){
  currentChatId = null;
  document.getElementById('chatListView').style.display='block';
  document.getElementById('chatWindowView').style.display='none';
};

function renderChatList(){
  const list = document.getElementById('chatList'); if(!list) return;
  const myChats = Object.entries(allChats).filter(([,c])=>c.participants?.includes(currentUser.nick));
  list.innerHTML = myChats.map(([id,c])=>`<div class="chat-item" onclick="openChatWindow('${id}')"><div><b>${c.listingTitle}</b></div></div>`).join('');
}

function renderChatMessages(){
  const container = document.getElementById('chatMessages'); if(!container || !currentChatId) return;
  const msgs = Object.values(allChats[currentChatId]?.messages||{});
  container.innerHTML = msgs.map(m=>`<div class="msg ${m.author===currentUser.nick?'mine':'theirs'}">${m.text}</div>`).join('');
  container.scrollTop = container.scrollHeight;
}

window.sendMsg = async function(){
  const input = document.getElementById('chatInput');
  if(!input.value.trim() || !currentChatId) return;
  await push(ref(db,'chats/'+currentChatId+'/messages'), { author: currentUser.nick, text: input.value.trim(), createdAt: Date.now() });
  input.value='';
};

window.renderMyListings = function(){
  const container = document.getElementById('myListingsContainer'); if(!container) return;
  const mine = Object.entries(allListings).filter(([,l])=>l.owner===currentUser.nick && !l.deleted);
  container.innerHTML = mine.map(([id,l])=>`
    <div class="my-listing-card">
      <div class="my-listing-info">
        <div class="my-listing-title">${l.title}</div>
        <div class="my-listing-actions">
          <button class="btn-sm btn-danger" onclick="deleteListing('${id}')">🗑 Видалити</button>
        </div>
      </div>
    </div>
  `).join('');
};

window.deleteListing = async function(id){
  if(confirm('Видалити?')) await update(ref(db,'listings/'+id), {deleted:true});
};

window.openCreateModal = function(){ document.getElementById('createModal').classList.add('open'); };
window.closeModal = function(id){ document.getElementById(id).classList.remove('open'); };

window.previewPhotos = async function(e){
  newPhotos = [];
  for(const f of e.target.files){
    const r = new FileReader();
    r.onload = () => {  newPhotos.push(r.result); document.getElementById('photoPreviewGrid').innerHTML += `<img src="${r.result}" style="width:50px;height:50px;object-fit:cover;margin:2px;border-radius:4px;"/>`; };
    r.readAsDataURL(f);
  }
};

window.createListing = async function(){
  const title = document.getElementById('newTitle').value;
  const petType = document.getElementById('newPetType').value;
  const breed = document.getElementById('newBreed').value;
  const price = document.getElementById('newPrice').value;
  const desc = document.getElementById('newDesc').value;
  await push(ref(db,'listings'),{ title, petType, breed, price, desc, photos: newPhotos, owner: currentUser.nick, createdAt: Date.now(), frozen:false, deleted:false });
  closeModal('createModal');
};

function renderAds(){
  const grid = document.getElementById('adsGrid'); if(!grid) return;
  grid.innerHTML = Object.entries(allAds).map(([id,a])=>`<div class="ad-card"><div class="ad-body"><b>${a.title}</b><p>${a.desc||''}</p></div></div>`).join('');
}
</script>
</body>
</html>
